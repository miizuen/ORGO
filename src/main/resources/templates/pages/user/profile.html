
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORGO - Tài khoản của tôi</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
          rel="stylesheet">
    
    <style>
        :root {
            --color-primary:        #2e7d32;
            --color-primary-dark:   #1a5c1a;
            --color-primary-light:  #f0f9f0;
            --color-bg:             #FAF8FF;
            --color-surface:        #ffffff;
            --color-border:         #e8e8e8;
            --color-text:           #1a1a2e;
            --color-text-muted:     #6b7280;
            --color-text-faint:     #9ca3af;
            --color-danger:         #d32f2f;
            --radius-card:          14px;
            --radius-btn:           10px;
            --font-body:            'Inter', sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font-body); 
            background: var(--color-bg); 
            color: var(--color-text); 
        }

        /* LAYOUT */
        .page {
            max-width: 1020px;
            margin: 32px auto;
            display: flex;
            gap: 24px;
            padding: 0 16px;
        }

        /* SIDEBAR */
        .sidebar { width: 220px; flex-shrink: 0; }
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .avatar-wrap { position: relative; }
        .avatar-wrap img {
            width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
            border: 2px solid var(--color-border);
        }
        .avatar-badge {
            position: absolute; bottom: 0; right: 0;
            background: var(--color-primary); border-radius: 50%;
            width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .avatar-badge svg { width: 11px; height: 11px; color: #fff; }
        .user-name { font-weight: 700; font-size: 15px; color: var(--color-text); }
        .user-rank { font-size: 11px; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.5px; }

        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 2px; }
        .sidebar-menu li a {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; color: var(--color-text-muted);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14.5px;
            transition: background 0.15s, color 0.15s;
        }
        .sidebar-menu li a:hover { 
            background: var(--color-primary-light); 
            color: var(--color-primary);
        }
        .sidebar-menu li a.active { 
            background: var(--color-primary); 
            color: #fff; 
            font-weight: 600; 
        }
        .sidebar-menu li a.active svg { color: #fff; }
        .sidebar-menu li a svg { width: 18px; height: 18px; color: var(--color-text-muted); flex-shrink: 0; }
        .sidebar-menu li a.signout { color: var(--color-danger); margin-top: 10px; }
        .sidebar-menu li a.signout svg { color: var(--color-danger); }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            background: var(--color-surface);
            border-radius: var(--radius-card);
            padding: 32px 36px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }
        .section-header {
            background: linear-gradient(135deg, #f0faf2 0%, #e8f5e9 100%);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 28px;
        }
        .section-header h2 { font-size: 17px; font-weight: 700; color: var(--color-text); margin-bottom: 6px; }
        .section-header p { font-size: 13.5px; color: var(--color-text-muted); line-height: 1.5; }

        /* FORM */
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        .form-group.full { flex: 0 0 calc(50% - 10px); }
        label {
            font-size: 11px; font-weight: 600; color: var(--color-text-faint);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        input[type="text"], input[type="email"], input[type="tel"] {
            border: 1.5px solid var(--color-border);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 14.5px;
            color: var(--color-text);
            background: #f8f9fb;
            outline: none;
            transition: border 0.2s;
            font-family: var(--font-body);
        }
        input:focus { border-color: var(--color-primary); background: var(--color-surface); }

        /* SECTION TUY CHON */
        .section-title { font-size: 18px; font-weight: 700; margin: 32px 0 16px; color: var(--color-text); }
        .option-card {
            border: 1.5px solid var(--color-border);
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .option-card:hover { border-color: #aaa; }
        .option-card .check {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid #ccc;
            flex-shrink: 0;
            margin-top: 2px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }
        .option-card.checked .check { background: var(--color-primary); border-color: var(--color-primary); }
        .option-card.checked .check svg { display: block; }
        .option-card .check svg { display: none; width: 13px; height: 13px; color: #fff; }
        .option-text strong { font-size: 14.5px; font-weight: 600; display: block; margin-bottom: 3px; color: var(--color-text); }
        .option-text span { font-size: 13px; color: var(--color-text-muted); }

        /* BUTTONS */
        .btn-row { display: flex; gap: 14px; margin-top: 36px; }
        .btn {
            padding: 13px 28px;
            border: none;
            border-radius: var(--radius-btn);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, background 0.15s;
            font-family: var(--font-body);
        }
        .btn:hover { opacity: 0.88; }
        .btn-save { background: var(--color-primary); color: #fff; }
        .btn-save:hover { background: var(--color-primary-dark); }
        .btn-reset { background: #3b4fc8; color: #fff; }

        /* FOOTER */
        footer {
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            margin-top: 48px;
            padding: 40px 60px 28px;
        }
        .footer-inner {
            max-width: 1020px;
            margin: 0 auto;
            display: flex;
            gap: 48px;
            align-items: flex-start;
        }
        .footer-brand { flex: 1; }
        .footer-brand .logo { font-weight: 900; font-size: 20px; color: var(--color-primary); margin-bottom: 12px; }
        .footer-brand p { font-size: 12px; color: var(--color-text-faint); line-height: 1.6; }
        .footer-col h4 { font-size: 13px; font-weight: 700; margin-bottom: 14px; color: var(--color-text); }
        .footer-col a {
            display: block; text-decoration: none;
            font-size: 12px; color: var(--color-text-faint);
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px;
        }
        .footer-col a:hover { color: var(--color-primary); }
        .newsletter-input {
            display: flex;
            border: 1.5px solid var(--color-border);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 4px;
        }
        .newsletter-input input {
            border: none; background: var(--color-surface);
            padding: 9px 12px; font-size: 13px; outline: none; flex: 1;
            font-family: var(--font-body);
        }
        .newsletter-input button {
            background: var(--color-primary); border: none; color: #fff;
            padding: 0 14px; cursor: pointer; font-size: 16px;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- PAGE -->
<div class="page">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="user-info">
            <div class="avatar-wrap">
                <img th:src="${userProfile != null && userProfile.getAccount().getAvatarUrl() != null
                              ? userProfile.getAccount().getAvatarUrl()
                              : 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + (userProfile != null ? userProfile.getAccount().getUsername() : 'User')}"
                     alt="Avatar">
                <div class="avatar-badge">
                    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                </div>
            </div>
            <div>
                <div class="user-name" th:text="${userProfile != null ? userProfile.getAccount().getUsername() : 'User'}">User</div>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li>
                <a th:href="@{/user/profile}" class="active">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Hồ sơ
                </a>
            </li>
            <li>
                <a th:href="@{/user/addresses}">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    Sổ địa chỉ
                </a>
            </li>
            <li>
                <a th:href="@{/user/orders}">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Lịch sử đơn hàng
                </a>
            </li>
            <li>
                <a th:href="@{/logout}" class="signout">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Đăng xuất
                </a>
            </li>
        </ul>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <div class="section-header">
            <h2>Tài khoản của tôi</h2>
            <p>Cập nhật thông tin cá nhân của bạn và quản lý cách chúng tôi liên lạc với bạn về vụ thu hoạch hữu cơ của bạn.</p>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/user/update-profile}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Họ tên</label>
                    <input type="text" name="fullName" 
                           th:value="${userProfile != null ? userProfile.getFullName() : ''}"
                           placeholder="Nhập họ tên">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" 
                           th:value="${userProfile != null ? userProfile.email : ''}"
                           placeholder="Nhập email">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group full">
                    <label>Số điện thoại</label>
                    <input type="tel" name="phone" 
                           th:value="${userProfile != null ? userProfile.getPhoneNumber() : ''}"
                           placeholder="Nhập số điện thoại">
                </div>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn btn-save">Lưu thay đổi</button>
            </div>
        </form>
    </main>
</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
