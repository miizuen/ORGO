<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Expert Dashboard</title>
    <style>
        .page-title h1 { font-size: 22px; font-weight: 700; }
        .page-title p { font-size: 13px; color: #6b7280; margin-top: 4px; }
        .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:24px; }
        .stat-card { background:#fff; border-radius:16px; padding:22px; border:1px solid #e5e7eb; }
        .stat-label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#6b7280; font-weight:700; }
        .stat-value { font-size:28px; font-weight:800; margin-top:8px; }
        .section-grid { display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-top:24px; }
        .card-box { background:#fff; border-radius:16px; padding:22px; border:1px solid #e5e7eb; }
        .card-title { font-size:16px; font-weight:700; margin-bottom:16px; }
        .activity-row { padding:14px 0; border-bottom:1px solid #f3f4f6; }
        .activity-row:last-child { border-bottom:none; }
    </style>
</head>
<body>
<div th:replace="~{fragments/expert-layout :: expertLayout('Dashboard', 'dashboard', ~{::main})}">
    <main>
        <div class="page-title">
            <h1>Chào mừng trở lại, chuyên gia!</h1>
            <p>Thống kê nội dung, lượt đọc và tương tác của bạn.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Lượt xem</div>
                <div class="stat-value">142,890</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tương tác</div>
                <div class="stat-value">24.5k</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Câu hỏi đã nhận</div>
                <div class="stat-value">312</div>
            </div>
        </div>

        <div class="section-grid">
            <div class="card-box">
                <div class="card-title">Hiệu suất bài viết</div>
                <div style="height:220px;background:linear-gradient(180deg,#dcfce7 0%, transparent 100%);border-radius:12px;"></div>
            </div>
            <div class="card-box">
                <div class="card-title">Hoạt động gần đây</div>
                <div class="activity-row">Đã đăng bài “Kiểm soát sâu bệnh hữu cơ”</div>
                <div class="activity-row">Đã trả lời câu hỏi của người dùng</div>
                <div class="activity-row">Bài viết mới được duyệt</div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
