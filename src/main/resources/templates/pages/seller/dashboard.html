<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seller Dashboard</title>
    <style>
        .page-title h1 { font-size: 22px; font-weight: 700; }
        .page-title p { font-size: 13px; color: #6b7280; margin-top: 4px; }
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-top:24px; }
        .stat-card { background:#fff; border-radius:16px; padding:22px; border:1px solid #e5e7eb; }
        .stat-label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#6b7280; font-weight:700; }
        .stat-value { font-size:28px; font-weight:800; margin-top:8px; }
        .section-grid { display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-top:24px; }
        .card-box { background:#fff; border-radius:16px; padding:22px; border:1px solid #e5e7eb; }
        .card-title { font-size:16px; font-weight:700; margin-bottom:16px; }
        .order-row { display:flex; justify-content:space-between; padding:14px 0; border-bottom:1px solid #f3f4f6; font-size:14px; }
        .order-row:last-child { border-bottom:none; }
    </style>
</head>
<body>
<div th:replace="~{fragments/seller-layout :: sellerLayout('Dashboard', 'dashboard', ~{::main})}">
    <main>
        <div class="page-title">
            <h1>ORGO Seller Center</h1>
            <p>Tổng quan hoạt động gian hàng của bạn.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Doanh thu tháng này</div>
                <div class="stat-value">$12,480</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Đơn hàng</div>
                <div class="stat-value">158</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Đánh giá</div>
                <div class="stat-value">4.92</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Khách hàng</div>
                <div class="stat-value">2,104</div>
            </div>
        </div>

        <div class="section-grid">
            <div class="card-box">
                <div class="card-title">Đơn hàng gần đây</div>
                <div class="order-row"><span>#ORG-8921</span><strong>Processing</strong></div>
                <div class="order-row"><span>#ORG-8920</span><strong>Pending</strong></div>
                <div class="order-row"><span>#ORG-8919</span><strong>Processing</strong></div>
            </div>
            <div class="card-box">
                <div class="card-title">Top sản phẩm</div>
                <div class="order-row"><span>Heirloom Tomatoes</span><strong>$3,410</strong></div>
                <div class="order-row"><span>Wildflower Honey</span><strong>$2,850</strong></div>
                <div class="order-row"><span>Curly Kale Bunch</span><strong>$1,180</strong></div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
