
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Duyệt Expert</title>
    <style>
        .page-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .table-wrapper {
            background: var(--color-surface, #fff);
            border-radius: var(--radius-card, 12px);
            border: 1px solid #eee;
            overflow: hidden;
        }

        .seller-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .seller-table thead {
            background: #f7f8fa;
        }

        .seller-table thead th {
            padding: 13px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #eee;
        }

        .seller-table tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background .12s;
        }

        .seller-table tbody tr:last-child {
            border-bottom: none;
        }

        .seller-table tbody tr:hover {
            background: #fafbff;
        }

        .seller-table td {
            padding: 14px 16px;
            vertical-align: middle;
            color: #333;
        }

        .seller-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .seller-location {
            font-size: 12px;
            color: #aaa;
        }

        .badge-new {
            display: inline-block;
            background: #e8f0fe;
            color: #3b6be8;
            font-size: 10px;
            font-weight: 700;
            border-radius: 5px;
            padding: 2px 8px;
            letter-spacing: 0.3px;
        }

        .btn-detail {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--color-primary, #3b6be8);
            color: #fff;
            border: none;
            border-radius: var(--radius-btn, 8px);
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background .15s;
            white-space: nowrap;
        }

        .btn-detail:hover {
            background: var(--color-primary-dark, #2a55cc);
            color: #fff;
        }

        .list-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 14px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #aaa;
        }

        .list-footer .footer-right {
            display: flex;
            gap: 16px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
        }

        .list-footer .footer-right span:hover {
            color: var(--color-primary, #3b6be8);
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin-layout :: adminLayout('Duyệt Expert', 'expert', ~{::main})}">
    <main>
        <div class="page-title">Danh sách yêu cầu phê duyệt Expert</div>

        <div th:if="${param.approved}" style="background: #e8f5e9; color: #2e7d32; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; border: 1px solid #c8e6c9;">
            Đã phê duyệt yêu cầu thành công! Expert hiện đã ở trạng thái ACTIVE.
        </div>
        <div th:if="${param.rejected}" style="background: #fce4ec; color: #c62828; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; border: 1px solid #f8bbd0;">
            Đã từ chối yêu cầu đăng ký của Expert.
        </div>

        <div class="table-wrapper">
            <table class="seller-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Tài khoản</th>
                    <th>Họ và tên</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="expert, iterStat : ${experts}">
                    <td th:text="${iterStat.count}">1</td>
                    <td>
                        <div class="seller-name" th:text="${expert.username}">Tài khoản</div>
                    </td>
                    <td>
                        <div class="seller-location" th:text="${expert.fullName}">Họ và tên</div>
                    </td>
                    <td>
                        <span class="badge-new" th:text="${expert.status}">NEW</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/expert-pending-list/expert-approve-detail(id=${expert.id})}" class="btn-detail">
                            Xem chi tiết
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="list-footer">
            <span th:text="'Tổng: ' + ${#lists.size(experts)} + ' yêu cầu'">Tổng: 0 yêu cầu</span>
            <div class="footer-right">
                <span>← Trước</span>
                <span>Tiếp →</span>
            </div>
        </div>
    </main>
</div>
</body>
</html>
