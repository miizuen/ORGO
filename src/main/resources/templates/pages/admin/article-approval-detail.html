<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bài viết - ORGO Admin</title>
</head>
<body>
<div th:replace="~{fragments/admin-layout :: adminLayout('Chi tiết bài viết', 'articles', ~{::main})}">
<main>
    <div class="container">
        <div class="header">
            <a href="#" class="back-btn">← Quay lại danh sách</a>
            <div class="header-actions">
                <span style="color: #6b7280; font-size: 14px;">Lưu nháp</span>
                <span style="color: #10b981; font-size: 14px; font-weight: 600;">Đang chờ duyệt</span>
            </div>
        </div>
        
        <div class="content-layout">
            <!-- Main Article -->
            <div class="article-main">
                <span class="article-badge">Lên sóng mới nhất</span>
                
                <h1 class="article-title" th:text="${article.title}">10 Mẹo duy trì lối sống hữu cơ ngay cả khi bận rộn</h1>
                
                <div class="author-info">
                    <img class="author-avatar" th:src="${article.expertAvatar != null && !article.expertAvatar.isEmpty() ? article.expertAvatar : '/api/placeholder/48/48'}" alt="Expert avatar">
                    <div class="author-details">
                        <h4 th:text="${article.expertName}">Hoàng Nam</h4>
                    </div>
                </div>
                
                <img th:src="${article.thumbnail != null && !article.thumbnail.isEmpty() ? article.thumbnail : '/api/placeholder/800/400'}" alt="Article" class="article-image">
                
                <div class="article-content" th:utext="${article.content}">
                    <!-- Content injected via thymeleaf -->
                </div>
                    
                    <div class="feedback-section">
                        <div class="feedback-title">💬 Phản hồi và tác của quản trị viên</div>
                        <div class="feedback-subtitle">GHI CHÚ NỘI BỘ CHO EXPERT</div>
                        <textarea class="feedback-textarea" placeholder="Nhập phản hồi hoặc yêu cầu chỉnh sửa cho tác giả..."></textarea>
                    </div>
                    
                    <div class="action-buttons">
                        <form th:action="@{/admin/articles/{id}/reject(id=${article.id})}" method="post" style="flex: 1;">
                            <input type="hidden" name="note" id="rejectNoteValue">
                            <button type="submit" class="btn btn-reject" onclick="document.getElementById('rejectNoteValue').value = document.querySelector('.feedback-textarea').value;" style="width:100%">Từ chối</button>
                        </form>
                        <form th:action="@{/admin/articles/{id}/approve(id=${article.id})}" method="post" style="flex: 1;">
                            <button type="submit" class="btn btn-approve" style="width:100%">↑ Phê duyệt và đăng tải</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Linked Products -->
                <div class="widget">
                    <div class="widget-title">🔗 SẢN PHẨM ĐÃ GẮN THẺ (<span th:text="${linkedProducts.size()}">0</span>)</div>
                    <div class="product-item" th:each="product : ${linkedProducts}">
                        <img th:src="${product.imageUrl != null ? product.imageUrl : (product.slug != null && product.slug.startsWith('/uploads/') ? product.slug : '/api/placeholder/200/200')}"
                             alt="Product" class="product-image">
                        <div class="product-info">
                            <div class="product-name" th:text="${product.productName}">Organic Spinach</div>
                            <div class="product-category" th:text="${product.shortDescription != null ? product.shortDescription : 'Product'}">Fresh Produce</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .back-btn {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .content-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
        }
        
        /* Main Article */
        .article-main {
            background: white;
            border-radius: 12px;
            padding: 48px;
        }
        
        .article-badge {
            display: inline-block;
            padding: 6px 14px;
            background: #dbeafe;
            color: #1e40af;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .article-title {
            font-size: 36px;
            font-weight: 700;
            color: #111827;
            line-height: 1.2;
            margin-bottom: 24px;
        }
        
        .author-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e5e7eb;
            margin-bottom: 32px;
        }
        
        .author-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #e5e7eb;
            object-fit: cover;
        }
        
        .author-details h4 {
            font-size: 14px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 4px;
        }
        
        .author-details p {
            font-size: 13px;
            color: #6b7280;
        }
        
        .article-meta {
            display: flex;
            gap: 16px;
            margin-left: auto;
            font-size: 13px;
            color: #6b7280;
        }
        
        .article-image {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 32px;
        }
        
        .article-content {
            font-size: 16px;
            line-height: 1.8;
            color: #374151;
        }
        
        .article-content h2 {
            font-size: 24px;
            color: #111827;
            margin: 32px 0 16px;
        }
        
        .article-content p {
            margin-bottom: 16px;
        }
        
        .article-content ul {
            margin: 16px 0 16px 24px;
        }
        
        .article-content li {
            margin-bottom: 8px;
        }
        
        /* Feedback Section */
        .feedback-section {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 2px solid #e5e7eb;
        }
        
        .feedback-title {
            font-size: 14px;
            font-weight: 600;
            color: #10b981;
            margin-bottom: 8px;
        }
        
        .feedback-subtitle {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        
        .feedback-textarea {
            width: 100%;
            min-height: 100px;
            padding: 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn {
            flex: 1;
            padding: 14px 24px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-reject {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .btn-reject:hover {
            background: #fecaca;
        }
        
        .btn-request {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .btn-request:hover {
            background: #bfdbfe;
        }
        
        .btn-approve {
            background: #10b981;
            color: white;
        }
        
        .btn-approve:hover {
            background: #059669;
        }
        
        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .widget {
            background: white;
            border-radius: 12px;
            padding: 20px;
        }
        
        .widget-title {
            font-size: 14px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 16px;
        }
        
        .product-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        
        .product-img {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .product-info {
            flex: 1;
        }
        
        .product-name {
            font-size: 13px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 4px;
        }
        
        .product-category {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 8px;
        }
        
        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
        }
        
        .product-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #d1fae5;
            color: #059669;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        /* Performance Card */
        .performance-card {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }
        
        .performance-rating {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .performance-text {
            font-size: 13px;
            color: #d1d5db;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .performance-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</main>
</div>
</body>
</html>
