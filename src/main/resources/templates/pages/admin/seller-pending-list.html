<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Duyệt Seller</title>
    <style>
        /* Page-specific only */
        .page-title { font-size: 22px; font-weight: 800; margin-bottom: 24px; }

        .seller-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .seller-card {
            background: var(--color-surface);
            border-radius: var(--radius-card);
            padding: 20px;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .seller-header { display: flex; align-items: flex-start; gap: 16px; }
        .seller-logo {
            width: 72px; height: 72px;
            border-radius: 12px;
            background: var(--color-primary);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 11px; font-weight: 800; text-align: center; line-height: 1.3; padding: 6px;
        }
        .seller-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .seller-location { font-size: 12px; color: var(--color-text-faint); }

        .seller-desc { font-size: 12px; color: var(--color-text-muted); line-height: 1.6; }

        .cert-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .cert-chip {
            display: flex; align-items: center; gap: 5px;
            background: #f5f5f5; border: 1px solid #e0e0e0;
            border-radius: 7px; padding: 5px 10px;
            font-size: 11px; color: #444; font-weight: 500;
        }

        .btn-detail {
            width: 100%;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-btn);
            padding: 11px;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            text-decoration: none;
            transition: background .15s;
        }
        .btn-detail:hover { background: var(--color-primary-dark); color: #fff; }

        .list-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 24px; padding-top: 16px; border-top: 1px solid #eee; font-size: 12px; color: #aaa; }
        .list-footer .footer-right { display: flex; gap: 16px; font-weight: 600; color: #666; cursor: pointer; }
        .list-footer .footer-right span:hover { color: var(--color-primary); }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin-layout :: adminLayout('Duyệt Seller', 'seller', ~{::main})}">
    <main>
        <div class="page-title">Danh sách yêu cầu phê duyệt Seller</div>

        <div class="seller-grid">
            <div class="seller-card" th:each="seller : ${sellers}">
                <div class="seller-header">
                    <div>
                        <div class="seller-name" th:text="${seller.getShopName()}"></div>
                        <div class="seller-location" th:text="${seller.getShopAddress()}"></div>
                        <span class="badge-blue" style="display:inline-block;margin-top:4px">NEW</span>
                    </div>
                </div>
                <a th:href="@{/admin/seller-approve-detail}" class="btn-detail">Xem chi tiết</a>
            </div>
        </div>

        <div class="list-footer">
            <span>🕐 Last updated: Just now</span>
            <div class="footer-right">
                <span>ARCHIVE</span>
                <span>EXPORT REPORT</span>
            </div>
        </div>
    </main>
</div>

</body>
</html>
