<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{fragments/admin-layout :: adminLayout('Duyệt sản phẩm', 'products', ~{::main})}">
    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fs-3 fw-bold text-dark">Quản lý & Duyệt sản phẩm</h1>
        </div>

        <!-- Success message -->
        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
            <span th:if="${param.success[0] == 'approved'}">✅ Đã duyệt sản phẩm thành công!</span>
            <span th:if="${param.success[0] == 'rejected'}">❌ Đã từ chối sản phẩm!</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Filter tabs -->
        <div class="d-flex gap-2 mb-4">
            <a th:href="@{/admin/products(status='pending')}"
               class="btn rounded-3 fw-semibold"
               th:classappend="${status == 'pending'} ? 'btn-warning text-dark' : 'btn-outline-secondary'">
                ⏳ Chờ duyệt
            </a>
            <a th:href="@{/admin/products(status='all')}"
               class="btn rounded-3 fw-semibold"
               th:classappend="${status == 'all'} ? 'btn-dark' : 'btn-outline-secondary'">
                📋 Tất cả
            </a>
        </div>

        <!-- Product table -->
        <div class="bg-white rounded-4 shadow-sm overflow-hidden">
            <table class="table table-hover mb-0">
                <thead class="bg-light">
                <tr>
                    <th class="fw-semibold text-secondary">Sản phẩm</th>
                    <th class="fw-semibold text-secondary">Seller ID</th>
                    <th class="fw-semibold text-secondary">Trạng thái</th>
                    <th class="fw-semibold text-secondary text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products.content}">
                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <img th:src="${product.slug != null ? product.slug : 'https://images.unsplash.com/photo-1540420773420-3366772f4999?w=100&q=80'}"
                                 th:alt="${product.productName}"
                                 class="rounded-3" style="width:55px;height:55px;object-fit:cover;">
                            <div>
                                <div class="fw-semibold" th:text="${product.productName}">Tên sản phẩm</div>
                                <div class="text-secondary small" th:text="${product.origin}">Nguồn gốc</div>
                            </div>
                        </div>
                    </td>
                    <td class="text-secondary" th:text="${product.sellerId}">1</td>
                    <td>
                    <span class="badge rounded-pill px-3 py-2"
                          th:classappend="${product.status.name() == 'ACTIVE'} ? 'bg-success' : (${product.status.name() == 'PENDING'} ? 'bg-warning text-dark' : 'bg-danger')"
                          th:text="${product.status.name() == 'ACTIVE' ? 'Đang bán' : (product.status.name() == 'PENDING' ? 'Chờ duyệt' : (product.status.name() == 'REJECTED' ? 'Bị từ chối' : 'Không hoạt động'))}">
                    </span>
                    </td>
                    <td class="text-end">
                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/admin/products/{id}(id=${product.id})}"
                               class="btn btn-sm btn-outline-secondary rounded-3">Xem</a>
                            <form th:if="${product.status.name() == 'PENDING'}"
                                  th:action="@{/admin/products/{id}/approve(id=${product.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-success rounded-3"
                                        onclick="return confirm('Duyệt sản phẩm này?')">✓ Duyệt</button>
                            </form>
                            <form th:if="${product.status.name() == 'PENDING'}"
                                  th:action="@{/admin/products/{id}/reject(id=${product.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-danger rounded-3"
                                        onclick="return confirm('Từ chối sản phẩm này?')">✕ Từ chối</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${products.totalElements == 0}" class="text-center py-5">
                <div class="display-1 mb-3">✅</div>
                <h5 class="fw-bold text-secondary">Không có sản phẩm nào cần duyệt</h5>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-4 d-flex justify-content-center">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/products(page=${currentPage - 1}, status=${status})}">«</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/products(page=${i}, status=${status})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/products(page=${currentPage + 1}, status=${status})}">»</a>
                </li>
            </ul>
        </nav>
    </main>
</div>
</body>
</html>
