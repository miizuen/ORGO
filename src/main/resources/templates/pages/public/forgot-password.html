<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Quên mật khẩu - ORGO', ~{::#forgot-content})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div id="forgot-content" class="container-fluid p-0 min-vh-100 overflow-hidden">
    <div class="row g-0 min-vh-100">
        <!-- Left Side: Visual Narrative -->
        <section class="col-12 col-md-6 col-lg-7 position-relative d-flex flex-column justify-content-between p-4 p-md-5 bg-dark">
            <!-- Background Image -->
            <div class="position-absolute top-0 start-0 w-100 h-100 z-0">
                <img class="w-100 h-100 object-fit-cover"
                     alt="Fresh organic herbs and morning dew"
                     th:src="'https://lh3.googleusercontent.com/aida-public/AB6AXuBzS7_CcQdDHnug-odmR_UD9yv5RCH9rOaSwUMf0LTOmca1JWxsDa17rodA4TjdBrQh1AQEIpJ0dHe1M2ybbn-UsYE-iyuSLGLRvSsnhZry4SjY8neoLDMx9uIsn8-t5VAF6vnQ9udS_6MGv4bHuct6CMmc7HQBWLFGfKhQ17eI7WnWmzAcZE-bVj8vN-n_3XpmAYv-ybOjXXeYkyhB58b-58rtrUxgihSmdMWaWvQtiRSVcDbYt1Y3QjhqHJeKZw4TXtrdrxCdXSWa'"
                     referrerpolicy="no-referrer" />
                <div class="position-absolute top-0 start-0 w-100 h-100 bg-black bg-opacity-50"></div>
            </div>

            <!-- Brand Identity -->
            <div class="position-relative z-1 mb-auto">
                <a class="display-6 fw-bolder text-white text-decoration-none mb-2" href="/">ORGO</a>
                <div class="bg-success rounded-pill mt-2" style="height: 4px; width: 48px;"></div>
            </div>

            <!-- Tagline -->
            <div class="position-relative z-1 mb-4 mt-5" style="max-width: 500px;">
                <h2 class="display-5 fw-bold text-white mb-4">Đừng lo, chúng tôi luôn ở đây giúp bạn.</h2>
                <p class="fs-5 text-light text-opacity-75">Chỉ cần nhập email đăng ký, chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu trong vòng vài phút.</p>
            </div>
        </section>

        <!-- Right Side: Forgot Password Form -->
        <section class="col-12 col-md-6 col-lg-5 d-flex align-items-center justify-content-center p-4 p-md-5 bg-body-tertiary">
            <div class="w-100" style="max-width: 450px;">
                <!-- Back to Login -->
                <a th:href="@{/login}" class="d-inline-flex align-items-center gap-2 text-secondary text-decoration-none small fw-semibold mb-4 hover-text-success">
                    <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
                    Quay lại đăng nhập
                </a>

                <!-- Header -->
                <div class="mb-4">
                    <div class="d-flex align-items-center justify-content-center bg-success bg-opacity-10 rounded-circle mb-4" style="width: 64px; height: 64px;">
                        <i data-lucide="mail" class="text-success" style="width: 32px; height: 32px;"></i>
                    </div>
                    <h3 class="fs-2 fw-bold text-dark mb-2">Quên mật khẩu?</h3>
                    <p class="text-secondary fs-5">Nhập địa chỉ email đã đăng ký và chúng tôi sẽ gửi mã OTP để đặt lại mật khẩu.</p>
                </div>

                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2 py-3 mb-3">
                    <i data-lucide="check-circle" style="width:18px;height:18px;flex-shrink:0;"></i>
                    <span th:text="${successMessage}"></span>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 py-3 mb-3">
                    <i data-lucide="alert-circle" style="width:18px;height:18px;flex-shrink:0;"></i>
                    <span th:text="${errorMessage}"></span>
                </div>

                <!-- Forgot Password Form -->
                <form class="d-flex flex-column gap-3" th:action="@{/forgot-password}" method="POST" id="forgotForm">
                    <!-- Email Field -->
                    <div>
                        <label class="form-label small fw-semibold text-secondary text-uppercase" for="email">Địa chỉ Email</label>
                        <div class="position-relative">
                            <i data-lucide="mail" class="position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary" style="width: 20px; height: 20px;"></i>
                            <input class="form-control form-control-lg bg-white border-0 py-3 ps-5 shadow-sm"
                                   id="email" name="email"
                                   placeholder="hello@organic.com"
                                   type="email" required />
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button id="submitBtn" class="btn btn-success btn-lg w-100 fw-bold py-3 mt-3 shadow-sm d-flex align-items-center justify-content-center gap-2 border-0" type="submit">
                        <i data-lucide="send" style="width: 20px; height: 20px;"></i>
                        <span id="btnText">Gửi mã OTP</span>
                    </button>
                </form>

                <!-- Register Link -->
                <div class="text-center mt-4">
                    <p class="text-secondary">Chưa có tài khoản?
                        <a th:href="@{/register}" class="text-success fw-bold text-decoration-none ms-1">Đăng ký ngay</a>
                    </p>
                </div>
            </div>
        </section>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('forgotForm').addEventListener('submit', function() {
            const btn = document.getElementById('submitBtn');
            const text = document.getElementById('btnText');
            text.textContent = 'Đang gửi...';
            btn.disabled = true;
        });
    </script>
</div>
</body>
</html>
