<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Blog - ORGO</title>
</head>
<body>
<main>
    <section class="hero-section" th:if="${featuredArticle != null}">
        <div class="hero-container">
            <div class="hero-content">
                <span class="category-badge"
                      th:text="${featuredArticle.category != null ? featuredArticle.category : 'ORGO'}">ORGO</span>
                <h1 class="hero-title" th:text="${featuredArticle.title}">Bài viết nổi bật</h1>
                <p class="hero-excerpt"
                   th:text="${featuredArticle.summary != null ? featuredArticle.summary : (featuredArticle.content != null && #strings.length(featuredArticle.content) > 150 ? #strings.substring(featuredArticle.content, 0, 150) + '...' : featuredArticle.content)}">
                    Mô tả bài viết featured...
                </p>
                <div class="hero-meta">
                    <img th:src="${featuredArticle.expertAvatar != null && !featuredArticle.expertAvatar.isEmpty() ? featuredArticle.expertAvatar : '/api/placeholder/48/48'}"
                         alt="Expert"
                         class="expert-avatar">
                    <div>
                        <p class="expert-name" th:text="${featuredArticle.expertName != null ? featuredArticle.expertName : 'ORGO'}">Elena Vance</p>
                        <p class="meta-info">
                            <span th:text="${featuredArticle.category != null ? featuredArticle.category : 'Blog'}">Blog</span> •
                            <span th:text="${featuredArticle.createdAt}">2026-04-30</span>
                        </p>
                    </div>
                </div>
                <a th:href="@{/articles/{id}(id=${featuredArticle.id})}" class="btn-primary">Đọc bài viết</a>
            </div>
            <div class="hero-image">
                <img th:src="${featuredArticle.thumbnail != null && !featuredArticle.thumbnail.isEmpty() ? featuredArticle.thumbnail : '/api/placeholder/800/600'}"
                     alt="Featured">
            </div>
        </div>
    </section>

    <section class="filter-section">
        <div class="container">
            <div class="filter-tabs">
                <a th:href="@{/articles}"
                   th:classappend="${category == null ? ' active' : ''}"
                   class="filter-tab">Tất cả</a>
                <a th:each="cat : ${categories}"
                   th:href="@{/articles(category=${cat})}"
                   th:classappend="${category == cat ? ' active' : ''}"
                   th:text="${cat}"
                   class="filter-tab">Tên danh mục</a>
            </div>
        </div>
    </section>

    <section class="blog-grid-section">
        <div class="container">
            <div class="blog-grid">
                <article class="blog-card" th:each="article : ${articles.content}">
                    <a th:href="@{/articles/{id}(id=${article.id})}" class="card-link">
                        <div class="card-image">
                            <img th:src="${article.thumbnail != null && !article.thumbnail.isEmpty() ? article.thumbnail : '/api/placeholder/600/400'}"
                                 th:alt="${article.title}">
                            <span class="card-category"
                                  th:text="${article.category != null ? article.category : 'Blog'}">Blog</span>
                        </div>
                        <div class="card-content">
                            <h3 class="card-title" th:text="${article.title}">Tiêu đề</h3>
                            <p class="card-excerpt"
                               th:text="${article.summary != null ? article.summary : (article.content != null && #strings.length(article.content) > 100 ? #strings.substring(article.content, 0, 100) + '...' : 'Mô tả bài viết...')}">
                                Mô tả bài viết...
                            </p>
                            <div class="card-footer">
                                <div class="author-info">
                                    <img th:src="${article.expertAvatar != null && !article.expertAvatar.isEmpty() ? article.expertAvatar : '/api/placeholder/32/32'}"
                                         alt="Author"
                                         class="author-avatar">
                                    <span class="author-name" th:text="${article.expertName != null ? article.expertName : 'ORGO'}">Tác giả</span>
                                </div>
                            </div>
                        </div>
                    </a>
                </article>
            </div>

            <div class="pagination" th:if="${articles.totalPages > 1}">
                <a th:href="@{/articles(page=${articles.number - 1}, category=${category})}"
                   th:if="${!articles.first}"
                   class="page-btn">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M6 10L2 6L6 2" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </a>

                <a th:each="i : ${#numbers.sequence(0, articles.totalPages - 1)}"
                   th:href="@{/articles(page=${i}, category=${category})}"
                   th:text="${i + 1}"
                   th:classappend="${i == articles.number ? ' active' : ''}"
                   class="page-number">1</a>

                <a th:href="@{/articles(page=${articles.number + 1}, category=${category})}"
                   th:if="${!articles.last}"
                   class="page-btn">
                    <svg width="8" height="12" viewBox="0 0 8 12" fill="none">
                        <path d="M2 2L6 6L2 10" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </a>
            </div>
        </div>
    </section>

<style>
.hero-section {
    background: #F2F3FF;
    border-radius: 12px;
    margin: 24px;
    padding: 64px;
    position: relative;
    overflow: hidden;
}
.hero-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: center;
}
.category-badge {
    display: inline-block;
    background: #006E2F;
    color: white;
    padding: 4px 12px;
    border-radius: 9999px;
    font-size: 10.4px;
    font-weight: 500;
    letter-spacing: 0.52px;
    text-transform: uppercase;
    margin-bottom: 24px;
}
.hero-title {
    font-family: 'Alata', sans-serif;
    font-size: 60px;
    line-height: 60px;
    letter-spacing: -1.5px;
    color: #131B2E;
    margin-bottom: 24px;
}
.hero-excerpt {
    font-size: 18px;
    line-height: 29px;
    color: #3D4A3D;
    margin-bottom: 24px;
}
.hero-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
}
.expert-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
}
.expert-name {
    font-weight: 700;
    font-size: 16px;
    color: #131B2E;
}
.meta-info {
    font-size: 14px;
    color: #3D4A3D;
}
.hero-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
}
.btn-primary {
    display: inline-block;
    background: linear-gradient(135deg, #006E2F 0%, #22C55E 100%);
    color: white;
    padding: 16px 32px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 18px;
    text-decoration: none;
}
.filter-section { padding: 40px 24px; }
.filter-tabs { display: flex; gap: 12px; flex-wrap: wrap; }
.filter-tab {
    padding: 8px 24px;
    background: #A2EEFF;
    color: #004E5A;
    border-radius: 9999px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.3s;
}
.filter-tab.active { background: #006E2F; color: white; }
.blog-grid-section { padding: 0 24px 80px; }
.blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-bottom: 80px; }
.blog-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0px 8px 32px rgba(19, 27, 46, 0.04);
    transition: transform 0.3s;
}
.blog-card:hover { transform: translateY(-4px); }
.card-link { text-decoration: none; color: inherit; }
.card-image { position: relative; height: 292px; background: #F2F3FF; }
.card-image img { width: 100%; height: 100%; object-fit: cover; }
.card-category {
    position: absolute; top: 12px; left: 16px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(2px);
    padding: 2.5px 12px; border-radius: 9999px;
    font-size: 11.2px; font-weight: 700; letter-spacing: 0.56px;
    text-transform: uppercase; color: #006E2F;
}
.card-content { padding: 24px; }
.card-title { font-size: 20px; font-weight: 700; line-height: 25px; color: #131B2E; margin-bottom: 12px; }
.card-excerpt { font-size: 16px; line-height: 26px; color: #3D4A3D; margin-bottom: 12px; }
.card-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 12px; border-top: 1px solid #E5E7EB;
}
.author-info { display: flex; align-items: center; gap: 12px; }
.author-avatar { width: 32px; height: 32px; border-radius: 50%; background: #EAEDFF; }
.author-name { font-size: 14px; font-weight: 600; color: #131B2E; }
.read-time { font-size: 12px; color: #3D4A3D; }
.pagination { display: flex; justify-content: center; align-items: center; gap: 16px; }
.page-btn, .page-number {
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; text-decoration: none; color: #131B2E; font-weight: 400;
}
.page-btn { border: 1px solid #BCCBB9; }
.page-number.active { background: #006E2F; color: white; font-weight: 700; }
@media (max-width: 1024px) {
    .blog-grid { grid-template-columns: repeat(2, 1fr); }
    .hero-container { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
    .blog-grid { grid-template-columns: 1fr; }
    .hero-title { font-size: 36px; line-height: 40px; }
}
</style>

</main>
</body>
</html>
