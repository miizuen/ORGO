<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">ORGO</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
    body { background-color: #FAF8FF; font-family: 'Inter', sans-serif; }

    /* ===== GLOBAL TRANSITIONS ===== */

    /* Buttons */
    .btn {
        transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }
    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
        filter: brightness(1.05);
    }
    .btn:active {
        transform: translateY(0);
        box-shadow: none;
    }

    /* Images */
    img {
        transition: opacity 0.3s ease;
    }

    .article-img-wrap {
        overflow: hidden;
        transition: box-shadow 0.4s ease;
    }
    .article-img-wrap .article-img {
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform;
    }
    .article-img-wrap:hover .article-img {
        transform: scale(1.08);
    }
    .article-img-wrap:hover {
        box-shadow: 0 10px 25px rgba(76, 175, 80, 0.15);
    }

    .article-title {
        transition: color 0.3s ease;
    }
    article:hover .article-title {
        color: #2e7d32;
    }

    .product-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .product-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
    }

    a {
        transition: color 0.2s ease, opacity 0.2s ease;
    }
    a:hover {
        opacity: 0.85;
    }
</style>
</head>
<body class="d-flex flex-column min-vh-100">

    <div th:if="${session.currentRole == 'seller' or session.currentRole == 'admin' or session.currentRole == 'expert'}"
         class="d-flex min-vh-100">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <main class="flex-grow-1 bg-light p-4">
            <div th:replace="${content}"></div>
        </main>
    </div>

    <th:block th:unless="${session.currentRole == 'seller' or session.currentRole == 'admin' or session.currentRole == 'expert'}">
        <div th:replace="~{fragments/header :: header}"></div>
        <main class="flex-grow-1">
            <div th:replace="${content}"></div>
        </main>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </th:block>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
