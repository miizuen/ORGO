<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header" class="bg-white shadow-sm position-relative z-3">
    <style>
        .dropdown-submenu {
            position: relative;
        }

        .dropdown-submenu .dropdown-menu {
            top: 0;
            right: 100%;
            margin-top: -1px;
            display: none;
        }

        .dropdown-submenu:hover .dropdown-menu {
            display: block;
        }
    </style>
    <div class="container-xl d-flex align-items-center justify-content-between py-3">
        <a th:href="@{/}" class="fs-4 fw-bold text-success text-decoration-none">ORGO</a>

        <nav class="d-none d-md-flex gap-4"
             sec:authorize="!isAuthenticated() or hasRole('USER')">
            <a th:href="@{/products}" class="text-secondary text-decoration-none fw-medium">Sản phẩm</a>
            <a th:href="@{/blog}"     class="text-secondary text-decoration-none fw-medium">Blog</a>
            <a th:href="@{/experts}"  class="text-secondary text-decoration-none fw-medium">Chuyên gia</a>
        </nav>

        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/user/cart}"
               class="text-secondary text-decoration-none d-flex align-items-center gap-1"
               sec:authorize="hasRole('USER')">
                🛒
            </a>

            <!-- Chưa đăng nhập -->
            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="btn btn-outline-success btn-sm fw-semibold px-4">Đăng nhập</a>
            </div>

            <!-- Đã đăng nhập: Dropdown -->
            <div sec:authorize="isAuthenticated()" class="dropdown">
                <button class="btn btn-link text-decoration-none small fw-medium text-secondary p-0 dropdown-toggle"
                        type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    Xin chào, <strong class="text-success" sec:authentication="principal.fullName"></strong>
                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                    <li>
                        <a class="dropdown-item" th:href="@{/user/profile}"
                           sec:authorize="hasRole('USER')">Hồ sơ</a>
                    </li>

                    <!-- NÂNG CẤP TÀI KHOẢN -->
                    <li class="dropdown-submenu">
                        <a class="dropdown-item dropdown-toggle" href="#">Nâng cấp tài khoản</a>
                        <ul class="dropdown-menu">
                            <li>
                                <a class="dropdown-item" th:href="@{/user/register-seller}">
                                    Đăng ký Seller
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" th:href="@{/user/register-expert}">
                                    Đăng ký Expert
                                </a>
                            </li>
                        </ul>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <li>
                        <a class="dropdown-item text-danger" th:href="@{/logout}">Đăng xuất</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</header>
</body>
</html>
