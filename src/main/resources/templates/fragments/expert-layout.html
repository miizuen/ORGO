<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>

<th:block th:fragment="expertLayout(title, activePage, content)">
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' – ORGO Expert'">ORGO Expert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--color-primary:#2e7d32;--color-primary-dark:#1b5e20;--color-bg:#f3faf4;--color-surface:#fff;--color-border:#e5e7eb;--color-text:#111827;--color-text-muted:#6b7280;--sidebar-width:260px;--topbar-height:64px;--font-body:'Inter',sans-serif;--radius-card:16px;}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);display:flex;height:100vh;overflow:hidden}
        .expert-sidebar{width:var(--sidebar-width);min-width:var(--sidebar-width);background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);border-right:1px solid var(--color-border);height:100vh;display:flex;flex-direction:column}
        .expert-brand{padding:24px;border-bottom:1px solid var(--color-border)}
        .expert-brand h2{font-size:18px;font-weight:800;color:var(--color-primary)}
        .expert-brand p{font-size:11px;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
        .expert-profile{padding:20px 24px;border-bottom:1px solid var(--color-border)}
        .expert-badge{display:inline-block;padding:4px 10px;background:#dcfce7;color:var(--color-primary-dark);border-radius:999px;font-size:11px;font-weight:700;margin-bottom:10px}
        .expert-name{font-size:15px;font-weight:700;margin-bottom:4px}
        .expert-status{font-size:12px;color:var(--color-text-muted)}
        .expert-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:6px}
        .expert-nav a{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;text-decoration:none;color:var(--color-text-muted);font-size:13px;font-weight:600;transition:.15s}
        .expert-nav a:hover,.expert-nav a.active{background:#f0fdf4;color:var(--color-primary-dark)}
        .expert-nav .dot{width:8px;height:8px;border-radius:999px;background:#cbd5e1}
        .expert-nav a.active .dot,.expert-nav a:hover .dot{background:var(--color-primary)}
        .expert-bottom{padding:16px 24px;border-top:1px solid var(--color-border)}
        .expert-logout{display:flex;align-items:center;gap:10px;text-decoration:none;color:#dc2626;font-size:13px;font-weight:600}
        .expert-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .expert-topbar{height:var(--topbar-height);background:#fff;border-bottom:1px solid var(--color-border);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0}
        .expert-search{flex:1;max-width:360px;background:#f3f4f6;border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px}
        .expert-search input{border:none;background:transparent;outline:none;width:100%;font-size:13px;font-family:var(--font-body)}
        .expert-user{margin-left:auto;display:flex;align-items:center;gap:10px}
        .expert-avatar{width:36px;height:36px;border-radius:10px;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;overflow:hidden}
        .expert-content{flex:1;overflow-y:auto;padding:28px 32px}
        .expert-card{background:var(--color-surface);border-radius:var(--radius-card);padding:22px}
    </style>
</head>
<body>
<aside class="expert-sidebar">
    <div class="expert-brand">
        <h2>ORGO Expert</h2>
        <p>Khu vực chuyên gia</p>
    </div>
    <div class="expert-profile">
        <span class="expert-badge">CONTENT EXPERT</span>
        <div class="expert-name" th:text="${session.currentUser != null ? session.currentUser : 'Expert'}">Expert</div>
        <div class="expert-status">Đang hoạt động</div>
    </div>
    <nav class="expert-nav">
        <a th:href="@{/expert/dashboard}" th:classappend="${activePage == 'dashboard'} ? ' active' : ''"><span class="dot"></span>Dashboard</a>
        <a th:href="@{/expert/articles}" th:classappend="${activePage == 'articles'} ? ' active' : ''"><span class="dot"></span>Bài viết của tôi</a>
        <a th:href="@{/expert/articles/new}" th:classappend="${activePage == 'article-new'} ? ' active' : ''"><span class="dot"></span>Viết bài mới</a>
    </nav>
    <div class="expert-bottom">
        <a th:href="@{/logout}" class="expert-logout">Đăng xuất</a>
    </div>
</aside>
<div class="expert-main">
    <header class="expert-topbar">
        <div class="expert-search"><span>🔍</span><input type="text" placeholder="Tìm kiếm..."></div>
        <div class="expert-user">
            <div>
                <div style="font-size:13px;font-weight:700" th:text="${session.currentUser != null ? session.currentUser : 'Expert'}">Expert</div>
                <div style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.4px">Expert Center</div>
            </div>
            <div class="expert-avatar">E</div>
        </div>
    </header>
    <div class="expert-content">
        <div th:replace="${content}"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
</th:block>

</body>
</html>
