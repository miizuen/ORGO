<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="adminSidebar(activePage)" class="sidebar">
    <div class="sidebar-logo">
        <h2>ORGO Admin</h2>
        <p>Quản lý hệ thống</p>
    </div>
    <nav class="sidebar-nav">
        <a th:href="@{/admin/dashboard}"
           th:classappend="${activePage == 'dashboard'} ? 'active' : ''"
           class="nav-item">
            <span class="icon">⊞</span> Tổng quan
        </a>
        <a th:href="@{/admin/users}"
           th:classappend="${activePage == 'users'} ? 'active' : ''"
           class="nav-item">
            <span class="icon">👥</span> Quản lý người dùng
        </a>
        <a th:href="@{/admin/seller-pending-list}"
           th:classappend="${activePage == 'seller'} ? 'active' : ''"
           class="nav-item">
            <span class="icon">🛒</span> Duyệt Seller
        </a>
        <a th:href="@{/admin/expert-pending-list}"
           th:classappend="${activePage == 'expert'} ? 'active' : ''"
           class="nav-item">
            <span class="icon">🔰</span> Duyệt Expert
        </a>
        <a th:href="@{/admin/content}"
           th:classappend="${activePage == 'content'} ? 'active' : ''"
           class="nav-item">
            <span class="icon">📋</span> Duyệt nội dung
        </a>
        <a th:href="@{/admin/orders}"
           th:classappend="${activePage == 'orders'} ? 'active' : ''"
           class="nav-item">
            <span class="icon">📦</span> Đơn đặt hàng
        </a>
        <a th:href="@{/admin/payouts}"
           th:classappend="${activePage == 'payouts'} ? 'active' : ''"
           class="nav-item">
            <span class="icon">💴</span> Đối soát và duyệt Payout
        </a>
        <a th:href="@{/admin/marketing}"
           th:classappend="${activePage == 'marketing'} ? 'active' : ''"
           class="nav-item">
            <span class="icon">📣</span> Marketing
        </a>
        <a th:href="@{/admin/reports}"
           th:classappend="${activePage == 'reports'} ? 'active' : ''"
           class="nav-item">
            <span class="icon">📊</span> Báo cáo hệ thống
        </a>
    </nav>
    <div class="sidebar-bottom">
        <a th:href="@{/admin/settings}"
           th:classappend="${activePage == 'settings'} ? 'active' : ''"
           class="nav-item">
            <span class="icon">⚙️</span> Cài đặt
        </a>
    </div>
    <div class="system-status">
        <div class="ss-title">SYSTEM STATUS</div>
        <div class="ss-sub">ALL SYSTEMS OPTIMAL</div>
    </div>
</aside>
</body>
</html>
